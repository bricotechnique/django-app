<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Édition du réglage {{ reglage.ref }}</title>

    <style>
        body { font-family: Arial; max-width: 950px; margin: auto; }
        h2 { margin-top: 40px; border-bottom: 2px solid #333; padding-bottom: 5px; }
        label { display: inline-block; width: 250px; font-weight: bold; margin-top: 8px; }
        input[type="text"], textarea { width: 300px; padding: 4px; }
        textarea { resize: vertical; }

        .btn { padding:10px 14px; font-size:15px; cursor:pointer; margin-right:10px; border:none; }
        .btn-cancel { background:#ccc; border:1px solid #999; }
        .btn-save { background:#4CAF50; color:white; }
        .btn-dup { background:#2196F3; color:white; }

        .autocomplete-box {
            border: 1px solid #aaa;
            background: white;
            position: absolute;
            z-index: 99;
            max-height: 200px;
            overflow-y: auto;
            width: 300px;
        }
        .autocomplete-option {
            padding: 6px;
            cursor: pointer;
        }
        .autocomplete-option:hover {
            background: #eef;
        }
    </style>
</head>

<body>

<form method="post" action="{% url 'logout' %}" style="display:inline;">

</form>

            value="update"

    <!-- Dupliquer -->

</div>

<!-- =========================== -->
<!-- AUTOCOMPLETE SCRIPT -->
<!-- =========================== -->
<script>
function setupAutocomplete(inputId, hiddenId, resultId) {
    const input = document.getElementById(inputId);
    const hidden = document.getElementById(hiddenId);
    const box = document.getElementById(resultId);

    input.addEventListener("input", () => {
        const query = input.value.trim();
        if (query.length < 2) {
            box.innerHTML = "";
            return;
        }

        fetch(`/api/of/?term=${query}`)
        .then(res => res.json())
        .then(data => {
            box.innerHTML = "";
            data.forEach(item => {
                const div = document.createElement("div");
                div.className = "autocomplete-option";
                div.innerHTML = `${item.of} — ${item.nom}`;
                div.onclick = () => {
                    input.value = item.of;
                    hidden.value = item.id;
                    box.innerHTML = "";
                };
                box.appendChild(div);
            });
        });
    });
}

setupAutocomplete("search_of_precedent", "of_precedent", "result_of_precedent");
setupAutocomplete("search_of_lavage", "of_lavage", "result_of_lavage");
</script>
